<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TalentFlow AI{% endblock %}</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <nav>
        <div class="nav-logo">TALENTFLOW AI</div>
        <div class="nav-links">
            <a href="{{ url_for('home') }}" class="nav-link">Home</a>
            <a href="{{ url_for('analyze') }}" class="nav-link">Engine</a>
            <a href="{{ url_for('about') }}" class="nav-link">About</a>
            <a href="{{ url_for('team') }}" class="nav-link">Team</a>
            <button id="themeToggle" class="theme-btn"><i class="fas fa-moon"></i></button>
        </div>
    </nav>

    {% block content %}{% endblock %}

    <footer>
        <p style="font-weight: 800; color: var(--text-main);">TALENTFLOW AI v2.0</p>
        <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 8px;">&copy; 2026 Abhishek Maheshwari. All Rights Reserved.</p>
    </footer>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
    <style>
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        /* Active Link Styling */
        .nav-link.active { color: var(--primary); }
    </style>
    <script>
        // Set active class on current nav link
        document.querySelectorAll('.nav-link').forEach(link => {
            if (link.href === window.location.href) {
                link.classList.add('active');
            }
        });
    </script>
</body>
</html>
